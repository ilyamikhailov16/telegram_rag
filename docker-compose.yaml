services:
  db:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_DB: ${DATABASE}
      POSTGRES_USER: ${USERNAME}
      POSTGRES_PASSWORD: ${PASSWORD}
    ports:
      - "5432:5432"

  app:
    build: .
    container_name: app
    depends_on:
      - db
    env_file:
      - .env